<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>数字孪生风控风洞 | v3.2.0 强化防御版</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/vue@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #121212; color: #e0e0e0; }
    .container { display: flex; flex-direction: column; height: 100vh; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background-color: #1e1e1e; border-bottom: 1px solid #333; }
    .logo { font-size: 24px; font-weight: bold; }
    .controls { display: flex; gap: 20px; }
    .control-group { display: flex; align-items: center; gap: 10px; }
    select, button { background-color: #333; color: #e0e0e0; border: 1px solid #555; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    .main-content { display: flex; flex: 1; overflow: hidden; }
    .left-panel, .right-panel { width: 25%; padding: 20px; background-color: #1e1e1e; overflow-y: auto; }
    .center-panel { flex: 1; padding: 20px; display: flex; flex-direction: column; }
    .agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
    .agent-card { background-color: #2a2a2a; border-radius: 8px; padding: 10px; text-align: center; border: 1px solid #444; transition: all 0.3s; }
    .agent-card .status { font-size: 12px; padding: 2px 5px; border-radius: 3px; margin-top: 5px; display: inline-block; }
    .status-idle { background-color: #555; } .status-crafting { background-color: #3a7ca5; } .status-blocked { background-color: #d9534f; } .status-retrying { background-color: #f0ad4e; } .status-success { background-color: #5cb85c; }
    .battle-log { flex: 1; background-color: #2a2a2a; margin-top: 20px; padding: 15px; border-radius: 8px; overflow-y: auto; }
    .log-entry { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #444; }
    .retry-link { text-decoration: none; color: #f0ad4e; }
    .retry-details { background-color: #333; padding: 5px; margin-top: 5px; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="app" class="container">
    <div class="top-bar">
      <div class="logo">风洞 v3.2.0</div>
      <div class="controls">
        <div class="control-group">
          <label for="platform-select">平台:</label>
          <select id="platform-select" v-model="platform" @change="setPlatform">
            <option value="weibo">微博</option>
            <option value="douyin">抖音</option>
            <option value="xiaohongshu">小红书</option>
            <option value="bilibili">B站</option>
          </select>
        </div>
        <div class="control-group">
          <label for="audit-mode-toggle">审核模式:</label>
          <button id="audit-mode-toggle" @click="toggleAuditMode">{{ auditMode === 'pre_audit' ? '先审后发' : '先发后审' }}</button>
        </div>
      </div>
    </div>
    <div class="main-content">
      <div class="left-panel">
        <h3>对抗配置</h3>
        <!-- Battle config form -->
      </div>
      <div class="center-panel">
        <h3>Agent 实时状态</h3>
        <div class="agents-grid">
          <div v-for="agent in agents" :key="agent.persona.id" class="agent-card">
            <div>{{ agent.persona.name }}</div>
            <span :class="'status status-' + agent.status">{{ agent.status }}</span>
          </div>
        </div>
        <div class="battle-log">
          <h3>对抗日志</h3>
          <div v-for="log in battleLogs" class="log-entry">
            <div><strong>{{ log.persona_name }}</strong> {{ log.is_success ? '绕过成功' : '被拦截' }}</div>
            <div v-if="log.retries_count > 0">
              <a href="#" @click.prevent="log.showRetries = !log.showRetries" class="retry-link">重试 {{ log.retries_count }} 次</a>
              <div v-if="log.showRetries" class="retry-details">
                <div v-for="retry in log.retry_history">[{{ retry.retry_index }}] {{ retry.detected ? '被拦' : '成功' }} - {{ retry.hit_layer }}</div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="right-panel">
        <h3>系统统计</h3>
        <!-- System stats -->
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, onMounted } = Vue

    createApp({
      setup() {
        const platform = ref('weibo')
        const auditMode = ref('pre_audit')
        const agents = ref([])
        const battleLogs = ref([])

        const fetchAgents = async () => {
          const res = await axios.get('/agents/states')
          agents.value = res.data.agents
        }

        const fetchLogs = async () => {
          const res = await axios.get('/battle/history?limit=20')
          battleLogs.value = res.data.history.map(l => ({ ...l, showRetries: false }))
        }

        const setPlatform = async () => {
          // Implement API call to set platform
        }

        const toggleAuditMode = async () => {
          const newMode = auditMode.value === 'pre_audit' ? 'post_audit' : 'pre_audit'
          await axios.post('/audit/mode', { mode: newMode })
          auditMode.value = newMode
        }

        onMounted(() => {
          fetchAgents()
          fetchLogs()
          setInterval(() => {
            fetchAgents()
            fetchLogs()
          }, 5000)
        })

        return { platform, auditMode, agents, battleLogs, setPlatform, toggleAuditMode }
      }
    }).mount('#app')
  </script>
</body>
</html>
